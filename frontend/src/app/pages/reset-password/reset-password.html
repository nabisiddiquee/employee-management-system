<div class="reset-page">
    <div class="reset-card">
        <div class="brand-badge">
            EMS
        </div>

        <h1>Reset Password</h1>

        <p class="subtitle">
            Create a new secure password for your Employee Management System account.
        </p>

        <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label>New Password</label>

                <div class="password-input-wrapper">
                    <input [type]="showNewPassword ? 'text' : 'password'" formControlName="newPassword"
                        placeholder="Enter new password" />

                    <button type="button" class="password-toggle" (click)="toggleNewPassword()">
                        {{ showNewPassword ? '🙈' : '👁️' }}
                    </button>
                </div>

                <small class="error" *ngIf="
            resetPasswordForm.get('newPassword')?.touched &&
            resetPasswordForm.get('newPassword')?.hasError('required')
          ">
                    New password is required.
                </small>

                <small class="error" *ngIf="
            resetPasswordForm.get('newPassword')?.touched &&
            resetPasswordForm.get('newPassword')?.hasError('minlength')
          ">
                    Password must be at least 6 characters.
                </small>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>

                <div class="password-input-wrapper">
                    <input [type]="showConfirmPassword ? 'text' : 'password'" formControlName="confirmPassword"
                        placeholder="Confirm new password" />

                    <button type="button" class="password-toggle" (click)="toggleConfirmPassword()">
                        {{ showConfirmPassword ? '🙈' : '👁️' }}
                    </button>
                </div>

                <small class="error" *ngIf="
            resetPasswordForm.get('confirmPassword')?.touched &&
            resetPasswordForm.get('confirmPassword')?.hasError('required')
          ">
                    Confirm password is required.
                </small>
            </div>

            <button type="submit" class="submit-button" [disabled]="loading">
                <span *ngIf="loading" class="btn-loader"></span>
                {{ loading ? 'Resetting Password...' : 'Reset Password' }}
            </button>
        </form>

        <a routerLink="/login" class="back-link">
            Back to Login
        </a>
    </div>
</div>
