<div class="forgot-page">
    <div class="forgot-card">
        <div class="brand-badge">
            EMS
        </div>

        <h1>Forgot Password?</h1>

        <p class="subtitle">
            Enter your registered email address and we will send you a password reset link.
        </p>

        <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label>Email Address</label>

                <input type="email" formControlName="email" placeholder="Enter your registered email" />

                <small class="error" *ngIf="
            forgotPasswordForm.get('email')?.touched &&
            forgotPasswordForm.get('email')?.hasError('required')
          ">
                    Email is required.
                </small>

                <small class="error" *ngIf="
            forgotPasswordForm.get('email')?.touched &&
            forgotPasswordForm.get('email')?.hasError('email')
          ">
                    Please enter a valid email address.
                </small>
            </div>

            <button type="submit" [disabled]="loading">
                <span *ngIf="loading" class="btn-loader"></span>
                {{ loading ? 'Sending Reset Link...' : 'Send Reset Link' }}
            </button>
        </form>

        <a routerLink="/login" class="back-link">
            Back to Login
        </a>
    </div>
</div>
